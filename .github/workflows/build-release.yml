name: Build and Release

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  pull_request:
    branches:
      - main
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version, for example v0.1.0. Only used when creating manual releases.'
        required: false
        type: string

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Publish win-x64
        shell: pwsh
        run: ./scripts/build-windows.ps1

      - name: Package
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path artifacts/dist | Out-Null
          Compress-Archive -Path artifacts/publish/* -DestinationPath artifacts/dist/VoiceBridge-win-x64.zip -Force

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: VoiceBridge-win-x64
          path: artifacts/dist/VoiceBridge-win-x64.zip

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/dist/VoiceBridge-win-x64.zip
          generate_release_notes: true
